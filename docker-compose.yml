services:
  mongo:
    image: mongo:7
    container_name: heyama-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - heyama-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: heyama-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./api/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/heyama
    depends_on:
      - mongo
    networks:
      - heyama-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    container_name: heyama-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - API_URL=http://api:3001
    depends_on:
      - api
    networks:
      - heyama-net

volumes:
  mongo-data:

networks:
  heyama-net:
    driver: bridge